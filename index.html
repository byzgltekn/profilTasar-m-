<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kullanıcı Profil Kartı</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --page:#f4f6f8;
    --card:#ffffff;
    --text:#1f2933;
    --muted:#6b7280;
    --line:#e6e9ee;
    --soft:#eef5f7;
    --brand:#266b73;
    --brand-dark:#1f5960;
    --shadow:0 18px 45px rgba(30, 41, 59, 0.12);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:32px 16px;
    background:var(--page);
    color:var(--text);
    font-family:'Inter', Arial, sans-serif;
  }

  .profile-card{
    position:relative;
    width:min(920px, 100%);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow:hidden;
    display:grid;
    grid-template-columns:320px 1fr;
  }

  .quick-actions{
    position:absolute;
    top:18px;
    right:18px;
    z-index:2;
    display:flex;
    gap:10px;
  }

  .icon-button{
    width:40px;
    height:40px;
    border:1px solid rgba(230, 233, 238, 0.9);
    border-radius:50%;
    background:rgba(255, 255, 255, 0.9);
    color:var(--text);
    display:grid;
    place-items:center;
    cursor:pointer;
    box-shadow:0 10px 22px rgba(30, 41, 59, 0.12);
  }

  .icon-button:hover{
    background:#ffffff;
    color:var(--brand-dark);
  }

  .icon-button:focus-visible{
    outline:3px solid rgba(38,107,115,0.25);
    outline-offset:3px;
  }

  .icon-button svg{
    width:19px;
    height:19px;
    stroke:currentColor;
  }

  .profile-photo{
    background:
      linear-gradient(180deg, rgba(38,107,115,0.08), rgba(38,107,115,0.02)),
      var(--soft);
    padding:34px 28px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    gap:28px;
    min-height:430px;
  }

  .tag{
    width:max-content;
    color:var(--brand-dark);
    background:#dfeff1;
    border:1px solid #c9e3e7;
    border-radius:999px;
    padding:7px 12px;
    font-size:13px;
    font-weight:600;
  }

  .avatar{
    width:180px;
    height:180px;
    margin:auto;
    border-radius:34px;
    background:
      radial-gradient(circle at 35% 28%, #f7d7c8 0 16%, transparent 17%),
      linear-gradient(145deg, #377982, #1f5960);
    position:relative;
    box-shadow:0 16px 28px rgba(31, 89, 96, 0.22);
    overflow:hidden;
  }

  .avatar::before{
    content:"";
    position:absolute;
    left:50%;
    top:42px;
    width:56px;
    height:56px;
    transform:translateX(-50%);
    border-radius:50%;
    background:#f2c1a9;
  }

  .avatar::after{
    content:"BG";
    position:absolute;
    left:50%;
    bottom:36px;
    width:112px;
    height:64px;
    transform:translateX(-50%);
    border-radius:34px 34px 18px 18px;
    background:#f9fbfc;
    color:var(--brand-dark);
    display:grid;
    place-items:center;
    font-size:28px;
    font-weight:700;
    letter-spacing:0;
  }

  .photo-note{
    margin:0;
    color:var(--muted);
    font-size:13px;
    line-height:1.5;
  }

  .profile-content{
    padding:42px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:24px;
  }

  .intro{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:20px;
  }

  h1{
    margin:0 0 8px;
    font-size:32px;
    line-height:1.15;
    font-weight:700;
    letter-spacing:0;
  }

  .role{
    margin:0;
    color:var(--muted);
    font-size:15px;
    line-height:1.5;
  }

  .status{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:8px;
    color:#23734a;
    font-size:14px;
    font-weight:600;
    padding-top:5px;
  }

  .status::before{
    content:"";
    width:9px;
    height:9px;
    border-radius:50%;
    background:#25b36a;
  }

  .details{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:14px;
    padding-top:4px;
  }

  .detail{
    border-top:1px solid var(--line);
    padding-top:14px;
    min-width:0;
  }

  .detail-label{
    display:block;
    margin-bottom:5px;
    color:var(--muted);
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }

  .detail-value{
    color:var(--text);
    font-size:14px;
    line-height:1.45;
    overflow-wrap:anywhere;
  }

  .actions{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .button{
    border:0;
    border-radius:10px;
    padding:12px 18px;
    background:var(--brand);
    color:#fff;
    font:600 14px 'Inter', Arial, sans-serif;
    cursor:pointer;
  }

  .button:hover{ background:var(--brand-dark); }
  .button:focus-visible{ outline:3px solid rgba(38,107,115,0.25); outline-offset:3px; }

  .link{
    color:var(--brand-dark);
    font-size:14px;
    font-weight:600;
    text-decoration:none;
    padding:10px 2px;
  }

  .link:hover{ text-decoration:underline; }
  .link:focus-visible{ outline:3px solid rgba(38,107,115,0.25); outline-offset:3px; }

  @media (max-width:760px){
    body{ padding:18px; }

    .profile-card{
      grid-template-columns:1fr;
      border-radius:16px;
    }

    .profile-photo{
      order:1;
      min-height:auto;
      padding:28px 24px 24px;
      gap:22px;
    }

    .avatar{
      width:150px;
      height:150px;
      border-radius:28px;
    }

    .avatar::before{
      top:34px;
      width:48px;
      height:48px;
    }

    .avatar::after{
      bottom:28px;
      width:94px;
      height:56px;
      font-size:24px;
    }

    .profile-content{
      order:2;
      padding:30px 24px 28px;
      gap:22px;
    }

    .intro{
      display:block;
    }

    h1{ font-size:27px; }

    .status{
      margin-top:14px;
      padding-top:0;
    }

    .details{
      grid-template-columns:1fr;
    }

    .actions{
      align-items:stretch;
    }

    .button{
      width:100%;
    }
  }
</style>
</head>
<body>
  <main class="profile-card" aria-label="Kullanıcı profil kartı">
    <div class="quick-actions" aria-label="Profil işlemleri">
      <button class="icon-button" type="button" aria-label="Bağlantıyı paylaş" title="Bağlantıyı paylaş">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <path d="M8.6 10.7l6.8-4.4"></path>
          <path d="M8.6 13.3l6.8 4.4"></path>
        </svg>
      </button>
      <button class="icon-button" type="button" aria-label="Diğer seçenekler" title="Diğer seçenekler">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="1"></circle>
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="12" cy="19" r="1"></circle>
        </svg>
      </button>
    </div>

    <section class="profile-photo" aria-label="Profil görseli">
      <span class="tag">Aktif stajyer</span>
      <div class="avatar" aria-hidden="true"></div>
      <p class="photo-note">Tasarım ekibiyle ürün arayüzleri ve kullanıcı akışları üzerinde çalışıyor.</p>
    </section>

    <section class="profile-content">
      <div class="intro">
        <div>
          <h1>Beyza Gültekin</h1>
          <p class="role">Ürün Tasarım Stajyeri · Ankara</p>
        </div>
        <span class="status">Aktif</span>
      </div>

      <div class="details">
        <div class="detail">
          <span class="detail-label">E-posta</span>
          <span class="detail-value">beyza.gultekin@mail.com</span>
        </div>
        <div class="detail">
          <span class="detail-label">Telefon</span>
          <span class="detail-value">+90 555 000 00 00</span>
        </div>
        <div class="detail">
          <span class="detail-label">Departman</span>
          <span class="detail-value">Ürün ve Tasarım</span>
        </div>
        <div class="detail">
          <span class="detail-label">Konum</span>
          <span class="detail-value">Ankara, Türkiye</span> 
        </div>
      </div>

      <div class="actions">
        <button class="button" type="button">Profili düzenle</button>
        <a class="link" href="#">LinkedIn profili</a>
        <a class="link" href="#">Mesaj gönder</a>
      </div>
    </section>
  </main>
</body>
</html>
